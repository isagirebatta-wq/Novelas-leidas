<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Biblioteca BL</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1208;--cream:#f5f0e8;--paper:#ede8dc;--warm:#c8a96e;--accent:#8b3a2a;--muted:#7a7060;--card:#faf7f2;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 10% 0%,rgba(200,169,110,.15) 0%,transparent 60%),
    radial-gradient(ellipse at 90% 100%,rgba(139,58,42,.10) 0%,transparent 55%);}
  header{padding:3.5rem 4rem 2rem;display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid rgba(122,112,96,.25);position:relative;overflow:hidden;}
  header::before{content:'❧';position:absolute;right:3rem;top:1.2rem;font-size:7rem;
    color:rgba(200,169,110,.12);pointer-events:none;line-height:1;}
  .header-left h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.4rem);
    font-weight:700;letter-spacing:-.02em;line-height:1.1;}
  .header-left h1 em{font-style:italic;color:var(--accent);}
  .header-left p{font-size:.9rem;color:var(--muted);margin-top:.5rem;letter-spacing:.06em;text-transform:uppercase;font-weight:300;}
  .stats{display:flex;gap:2rem;text-align:right;}
  .stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--accent);display:block;line-height:1;}
  .stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .filters{padding:1.5rem 4rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;border-bottom:1px solid rgba(122,112,96,.15);}
  .filter-label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:.4rem;}
  .chip{padding:.35rem 1rem;border-radius:100px;font-size:.8rem;border:1px solid rgba(122,112,96,.3);
    background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
  .chip:hover{border-color:var(--warm);color:var(--ink);}
  .chip.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
  .search-wrap{margin-left:auto;position:relative;}
  .search-wrap input{padding:.4rem 1rem .4rem 2.2rem;border:1px solid rgba(122,112,96,.3);border-radius:100px;
    background:rgba(255,255,255,.5);font-size:.85rem;font-family:'DM Sans',sans-serif;color:var(--ink);
    outline:none;width:200px;transition:border-color .2s,width .3s;}
  .search-wrap input:focus{border-color:var(--warm);width:240px;}
  .search-wrap input::placeholder{color:var(--muted);}
  .search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;}
  main{padding:2.5rem 4rem 5rem;}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:2rem 1.4rem;}
  .book-card{background:var(--card);border-radius:4px;overflow:hidden;border:1px solid rgba(122,112,96,.15);
    cursor:pointer;transition:transform .25s,box-shadow .25s;animation:fadeUp .5s both;position:relative;}
  .book-card:hover{transform:translateY(-6px) rotate(-.4deg);
    box-shadow:0 20px 40px rgba(26,18,8,.14),0 4px 12px rgba(26,18,8,.08);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .cover-wrap{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--paper);}
  .cover-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
  .book-card:hover .cover-wrap img{transform:scale(1.05);}

  /* ── Placeholder con imagen de fondo ── */
  .cover-placeholder{
    width:100%;height:100%;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    padding:.8rem;text-align:center;
    background-size:cover;background-position:center;
  }
  .cover-placeholder::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(to top,rgba(10,6,2,.85) 0%,rgba(10,6,2,.45) 50%,rgba(10,6,2,.15) 100%);
  }
  .ph-content{position:relative;z-index:1;}
  .ph-title{font-family:'Playfair Display',serif;font-size:.8rem;color:#f0e8d8;
    font-weight:700;line-height:1.35;font-style:italic;margin-bottom:.2rem;}
  .ph-author{font-size:.65rem;color:rgba(240,232,216,.6);}

  .genre-badge{position:absolute;top:.5rem;left:.5rem;padding:.18rem .5rem;border-radius:3px;
    font-size:.6rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
    background:rgba(26,18,8,.72);color:var(--cream);backdrop-filter:blur(4px);}
  .rating-badge{position:absolute;top:.5rem;right:.5rem;background:rgba(200,169,110,.92);
    color:var(--ink);font-size:.68rem;font-weight:500;padding:.18rem .4rem;border-radius:3px;}
  .card-body{padding:.8rem .8rem .9rem;}
  .card-title{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;line-height:1.3;margin-bottom:.2rem;}
  .card-author{font-size:.72rem;color:var(--muted);margin-bottom:.5rem;font-weight:300;}
  .card-desc{font-size:.75rem;color:#5a5040;line-height:1.55;display:-webkit-box;
    -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .card-date{font-size:.68rem;color:var(--muted);margin-top:.6rem;display:flex;align-items:center;gap:.3rem;}
  .card-date::before{content:'';display:inline-block;width:10px;height:1px;background:var(--warm);}
  .add-card{background:transparent;border:2px dashed rgba(122,112,96,.3);border-radius:4px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;
    cursor:pointer;min-height:300px;color:var(--muted);font-size:.82rem;font-family:'DM Sans',sans-serif;
    transition:all .2s;text-transform:uppercase;letter-spacing:.08em;}
  .add-card:hover{border-color:var(--warm);color:var(--warm);background:rgba(200,169,110,.04);}
  .add-icon{font-size:2rem;}
  .overlay{position:fixed;inset:0;background:rgba(26,18,8,.6);backdrop-filter:blur(6px);z-index:100;
    display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--cream);border-radius:8px;width:min(92vw,620px);max-height:90vh;
    overflow-y:auto;padding:2.5rem;transform:translateY(20px);transition:transform .3s;position:relative;}
  .overlay.open .modal{transform:translateY(0);}
  .modal h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:1.5rem;}
  .modal h2 em{color:var(--accent);font-style:italic;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .form-grid .full{grid-column:1/-1;}
  label{display:block;font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;}
  input,textarea,select{width:100%;padding:.6rem .85rem;border:1px solid rgba(122,112,96,.35);border-radius:4px;
    background:rgba(255,255,255,.6);font-size:.88rem;font-family:'DM Sans',sans-serif;color:var(--ink);
    outline:none;transition:border-color .2s;resize:vertical;}
  input:focus,textarea:focus,select:focus{border-color:var(--warm);}
  .modal-actions{display:flex;gap:.8rem;justify-content:flex-end;margin-top:1.5rem;}
  .btn{padding:.6rem 1.6rem;border-radius:4px;font-size:.85rem;font-family:'DM Sans',sans-serif;
    font-weight:500;cursor:pointer;transition:all .2s;border:none;}
  .btn-ghost{background:transparent;border:1px solid rgba(122,112,96,.35);color:var(--muted);}
  .btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
  .btn-primary{background:var(--ink);color:var(--cream);}
  .btn-primary:hover{background:var(--accent);}
  .btn-danger{background:transparent;color:var(--accent);border:1px solid rgba(139,58,42,.3);margin-right:auto;}
  .btn-danger:hover{background:rgba(139,58,42,.08);}
  .close-btn{position:absolute;top:1.2rem;right:1.2rem;background:none;border:none;
    font-size:1.4rem;color:var(--muted);cursor:pointer;line-height:1;transition:color .15s;}
  .close-btn:hover{color:var(--ink);}
  @media(max-width:700px){
    header,.filters,main{padding-left:1.5rem;padding-right:1.5rem;}
    header{flex-direction:column;align-items:flex-start;gap:1.5rem;}
    .stats{text-align:left;}
    .form-grid{grid-template-columns:1fr;}
    .form-grid .full{grid-column:1;}
    .search-wrap{margin-left:0;}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Mi <em>Biblioteca BL</em></h1>
    <p>Novelas asiáticas leídas · colección personal</p>
  </div>
  <div class="stats">
    <div><span class="stat-num" id="count">0</span><span class="stat-label">Novelas</span></div>
    <div><span class="stat-num" id="genres-count">0</span><span class="stat-label">Géneros</span></div>
  </div>
</header>

<div class="filters">
  <span class="filter-label">Filtrar:</span>
  <button class="chip active" data-genre="all">Todos</button>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar novela…">
  </div>
</div>

<main><div id="grid"></div></main>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-btn" id="closeModal">✕</button>
    <h2 id="modal-title">Añadir <em>novela</em></h2>
    <div class="form-grid">
      <div><label>Título *</label><input id="f-title" type="text" placeholder="Título"></div>
      <div><label>Autor</label><input id="f-author" type="text" placeholder="Autor"></div>
      <div><label>Género</label><input id="f-genre" type="text" placeholder="Xianxia, Sci-Fi, Contemporáneo…"></div>
      <div>
        <label>Mi puntuación</label>
        <select id="f-rating">
          <option value="">— Sin puntuación —</option>
          <option value="⭐ 1/5">⭐ 1/5</option>
          <option value="⭐⭐ 2/5">⭐⭐ 2/5</option>
          <option value="⭐⭐⭐ 3/5">⭐⭐⭐ 3/5</option>
          <option value="⭐⭐⭐⭐ 4/5">⭐⭐⭐⭐ 4/5</option>
          <option value="⭐⭐⭐⭐⭐ 5/5">⭐⭐⭐⭐⭐ 5/5</option>
        </select>
      </div>
      <div class="full"><label>URL de la portada</label><input id="f-cover" type="text" placeholder="https://…"></div>
      <div class="full"><label>Descripción</label><textarea id="f-desc" rows="3" placeholder="Sinopsis o tus impresiones…"></textarea></div>
      <div><label>Fecha de lectura</label><input id="f-date" type="month"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteBtn" style="display:none">Eliminar</button>
      <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="saveBtn">Guardar</button>
    </div>
  </div>
</div>

let books = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
if (!books) { books = DEFAULT_BOOKS; localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }

let editingId = null, activeGenre = 'all';
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }

function renderChips() {
  const genres = [...new Set(books.map(b=>b.genre).filter(Boolean))].sort();
  const bar = document.querySelector('.filters');
  [...bar.querySelectorAll('.chip')].forEach(c=>c.remove());
  bar.insertBefore(makeChip('Todos','all'), bar.children[1]);
  genres.forEach(g => bar.insertBefore(makeChip(g,g), bar.children[bar.children.length-1]));
}

function makeChip(label, val) {
  const btn = document.createElement('button');
  btn.className = 'chip'+(activeGenre===val?' active':'');
  btn.dataset.genre = val; btn.textContent = label;
  btn.onclick = () => { activeGenre=val; renderAll(); };
  return btn;
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return books.filter(b => {
    const mg = activeGenre==='all' || b.genre?.toLowerCase()===activeGenre.toLowerCase();
    const mq = !q || b.title?.toLowerCase().includes(q) || b.author?.toLowerCase().includes(q) || b.desc?.toLowerCase().includes(q);
    return mg && mq;
  });
}

function ph(b) {
  const bg = getBg(b.genre);
  return `<div class="cover-placeholder" style="background-image:url('${bg}')">
    <div class="ph-content">
      <div class="ph-title">${(b.title||'').replace(/'/g,'&#39;')}</div>
      ${b.author && b.author !== 'Desconocido' ? `<div class="ph-author">${b.author}</div>` : ''}
    </div>
  </div>`;
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m] = d.split('-');
  return ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][+m-1]+' '+y;
}

function renderAll() {
  renderChips();
  const list = filtered(), grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('count').textContent = books.length;
  document.getElementById('genres-count').textContent = new Set(books.map(b=>b.genre).filter(Boolean)).size;

  list.forEach((b,i) => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.style.animationDelay = Math.min(i*0.03, 0.6)+'s';
    const phHtml = ph(b).replace(/`/g,"'");
    const imgHtml = b.cover
      ? `<img src="${b.cover}" alt="${(b.title||'').replace(/"/g,'')}" onerror="this.outerHTML=\`${phHtml}\`">`
      : ph(b);
    card.innerHTML = `
      <div class="cover-wrap">${imgHtml}
        ${b.genre?`<span class="genre-badge">${b.genre}</span>`:''}
        ${b.rating?`<span class="rating-badge">${b.rating.split(' ')[0]}</span>`:''}
      </div>
      <div class="card-body">
        <div class="card-title">${b.title}</div>
        <div class="card-author">${b.author||''}</div>
        ${b.desc?`<div class="card-desc">${b.desc}</div>`:''}
        ${b.date?`<div class="card-date">${fmtDate(b.date)}</div>`:''}
      </div>`;
    card.onclick = () => openEdit(b.id);
    grid.appendChild(card);
  });

  const add = document.createElement('div');
  add.className='add-card';
  add.innerHTML='<span class="add-icon">＋</span><span>Añadir novela</span>';
  add.onclick=openAdd; grid.appendChild(add);
}

function openAdd() {
  editingId=null;
  document.getElementById('modal-title').innerHTML='Añadir <em>novela</em>';
  clearForm(); document.getElementById('deleteBtn').style.display='none'; openOverlay();
}

function openEdit(id) {
  const b = books.find(x=>x.id===id); if(!b) return;
  editingId=id;
  document.getElementById('modal-title').innerHTML='Editar <em>novela</em>';
  document.getElementById('f-title').value=b.title||'';
  document.getElementById('f-author').value=b.author||'';
  document.getElementById('f-genre').value=b.genre||'';
  document.getElementById('f-rating').value=b.rating||'';
  document.getElementById('f-cover').value=b.cover||'';
  document.getElementById('f-desc').value=b.desc||'';
  document.getElementById('f-date').value=b.date||'';
  document.getElementById('deleteBtn').style.display='block'; openOverlay();
}

function clearForm() {
  ['f-title','f-author','f-genre','f-cover','f-desc','f-date'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-rating').value='';
}
function openOverlay()  { document.getElementById('overlay').classList.add('open'); }
function closeOverlay() { document.getElementById('overlay').classList.remove('open'); }

document.getElementById('saveBtn').onclick = () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const book = {
    id: editingId||Date.now().toString(), title,
    author: document.getElementById('f-author').value.trim(),
    genre:  document.getElementById('f-genre').value.trim(),
    rating: document.getElementById('f-rating').value,
    cover:  document.getElementById('f-cover').value.trim(),
    desc:   document.getElementById('f-desc').value.trim(),
    date:   document.getElementById('f-date').value,
  };
  books = editingId ? books.map(b=>b.id===editingId?book:b) : [...books, book];
  save(); closeOverlay(); renderAll();
};

document.getElementById('deleteBtn').onclick = () => {
  if (!confirm('¿Eliminar esta novela?')) return;
  books = books.filter(b=>b.id!==editingId);
  save(); closeOverlay(); renderAll();
};
document.getElementById('cancelBtn').onclick = closeOverlay;
document.getElementById('closeModal').onclick = closeOverlay;
document.getElementById('overlay').onclick = e => { if(e.target.id==='overlay') closeOverlay(); };
document.getElementById('search').oninput = renderAll;
renderAll();
</script>
